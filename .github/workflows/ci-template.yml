name: MERN Microservice Reusable CI

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version used by MERN services.
        required: false
        type: string
        default: "18"
      docker-context:
        description: Docker build context.
        required: false
        type: string
        default: "."
      dockerfile:
        description: Dockerfile path.
        required: false
        type: string
        default: "Dockerfile"
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      SNYK_TOKEN:
        required: true
      SLACK_WEBHOOK_URL:
        required: true
  workflow_dispatch:
    inputs:
      node-version:
        description: Node.js version used by MERN services.
        required: false
        type: string
        default: "18"
      docker-context:
        description: Docker build context.
        required: false
        type: string
        default: "."
      dockerfile:
        description: Dockerfile path.
        required: false
        type: string
        default: "Dockerfile"

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: ${{ inputs['node-version'] }}
  BRANCH_NAME: ${{ github.base_ref || github.ref_name }}
  REPO_NAME: ${{ github.event.repository.name }}
  COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  setup:
    name: Setup And Build
    runs-on: ubuntu-latest

    steps:
      # Download the service repository code.
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install Node.js 18 for MERN services.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # Install npm dependencies.
      - name: Install Dependencies
        run: npm install

      # Build only when the repository has a build script.
      - name: Build If Build Script Exists
        shell: bash
        run: |
          if npm run | grep -q " build"; then
            npm run build
          else
            echo "No build script found. Skipping build."
          fi

  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: setup

    steps:
      # Each job gets a fresh runner, so checkout is needed again.
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # SonarQube should run, but it must not fail this CI pipeline.
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  snyk:
    name: Snyk Scan
    runs-on: ubuntu-latest
    needs: setup

    steps:
      # Snyk needs the repository files and package manifests.
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Run Snyk dependency scan.
      # It is allowed to fail here so we can apply dev/main rules in the next step.
      - name: Snyk Scan
        id: snyk
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --json-file-output=snyk-report.json

      # Upload the Snyk report from this job as a workflow artifact.
      - name: Upload Snyk Report
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report-${{ env.REPO_NAME }}-${{ env.COMMIT_SHA }}
          path: snyk-report.json
          if-no-files-found: warn

      # DEV rule: fail when Snyk finds dependency issues.
      # MAIN rule: do not fail because of Snyk vulnerabilities.
      - name: Fail On Snyk Issues In DEV
        if: ${{ env.BRANCH_NAME == 'dev' && steps.snyk.outcome == 'failure' }}
        run: |
          echo "Snyk found issues on dev. Failing the pipeline."
          exit 1

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: snyk
    outputs:
      image_name: ${{ steps.image.outputs.image_name }}
      image_tag: ${{ steps.tag.outputs.image_tag }}
      image_uri: ${{ steps.image.outputs.image_name }}:${{ steps.tag.outputs.image_tag }}
      image_exists: ${{ steps.image_check.outputs.exists }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Docker Login To GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set Image Name
        id: image
        run: |
          IMAGE_REPOSITORY="${GITHUB_REPOSITORY,,}"
          echo "image_name=ghcr.io/$IMAGE_REPOSITORY" >> "$GITHUB_OUTPUT"

      - name: Set DEV Image Tag
        if: ${{ env.BRANCH_NAME == 'dev' }}
        run: echo "IMAGE_TAG=${{ env.COMMIT_SHA }}" >> "$GITHUB_ENV"

      - name: GitHub Tag
        if: ${{ env.BRANCH_NAME == 'main' }}
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        env:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set MAIN Image Tag
        if: ${{ env.BRANCH_NAME == 'main' }}
        run: echo "IMAGE_TAG=${{ steps.tag_version.outputs.new_version }}" >> "$GITHUB_ENV"

      - name: Save Image Tag
        id: tag
        run: echo "image_tag=${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"

      - name: Check If Image Already Exists In GHCR
        id: image_check
        run: |
          if docker manifest inspect "${{ steps.image.outputs.image_name }}:${{ steps.tag.outputs.image_tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # BUILD ONLY (NO PUSH) - push happens in docker-push job after Trivy scan
      - name: Docker Build (No Push)
        if: ${{ steps.image_check.outputs.exists == 'false' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs['docker-context'] }}
          file: ${{ inputs.dockerfile }}
          push: false
          load: true
          tags: ${{ steps.image.outputs.image_name }}:${{ steps.tag.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Save image so trivy and docker-push jobs can reuse the same artifact (no rebuild)
      - name: Save Docker Image As Artifact
        if: ${{ steps.image_check.outputs.exists == 'false' }}
        run: |
          docker save ${{ steps.image.outputs.image_name }}:${{ steps.tag.outputs.image_tag }} -o image.tar

      - name: Upload Image Artifact
        if: ${{ steps.image_check.outputs.exists == 'false' }}
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ env.COMMIT_SHA }}
          path: image.tar

  trivy:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      # If the image was newly built, scan the locally loaded image (pre-push).
      # If the image already exists in GHCR, no artifact was produced — skip download
      # and let Trivy pull the existing image by reference.
      - name: Download Image Artifact
        if: ${{ needs.docker-build.outputs.image_exists == 'false' }}
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ env.COMMIT_SHA }}

      - name: Load Docker Image
        if: ${{ needs.docker-build.outputs.image_exists == 'false' }}
        run: docker load -i image.tar

      - name: Trivy Scan - DEV Fails On Vulnerabilities
        if: ${{ env.BRANCH_NAME == 'dev' }}
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ needs['docker-build'].outputs.image_uri }}
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Trivy Scan - MAIN Does Not Fail
        if: ${{ env.BRANCH_NAME == 'main' }}
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ needs['docker-build'].outputs.image_uri }}
          severity: HIGH,CRITICAL
          exit-code: "0"

  docker-push:
    name: Docker Push (Post Scan)
    runs-on: ubuntu-latest
    needs: [docker-build, trivy]

    # Fail-fast: push ONLY when both docker-build and trivy succeeded,
    # AND the image was newly built (skip if already exists in GHCR).
    # Listing trivy in `needs` already gates push on trivy success by default;
    # the explicit check below makes the intent unambiguous.
    if: ${{ needs.docker-build.result == 'success' && needs.trivy.result == 'success' && needs.docker-build.outputs.image_exists == 'false' }}

    steps:
      - name: Docker Login To GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ env.COMMIT_SHA }}

      - name: Load Docker Image
        run: docker load -i image.tar

      # PUSH ONLY AFTER TRIVY HAS PASSED
      - name: Push Image
        run: |
          docker push ${{ needs.docker-build.outputs.image_uri }}

  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [setup, sonar, snyk, docker-build, trivy, docker-push]
    if: ${{ always() && (github.base_ref == 'main' || github.ref_name == 'main' || ((github.base_ref == 'dev' || github.ref_name == 'dev') && contains(join(needs.*.result, ','), 'failure'))) }}

    steps:
      # DEV sends Slack only on failure. MAIN sends Slack on success or failure.
      - name: Slack Notification
        uses: slackapi/slack-github-action@v1.27.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ contains(join(needs.*.result, ','), 'failure') && '#e01e5a' || '#2eb67d' }}",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "CI Pipeline: ${{ contains(join(needs.*.result, ','), 'failure') && 'failure' || 'success' }}"
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        {
                          "type": "mrkdwn",
                          "text": "*Repository:*\n${{ github.repository }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Branch:*\n${{ env.BRANCH_NAME }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Status:*\n${{ contains(join(needs.*.result, ','), 'failure') && 'failure' || 'success' }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Commit SHA:*\n${{ env.COMMIT_SHA }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }